<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAI Cell | Official Auditions</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="journey.css" />
  </head>
  <body>
<main class="journey-hero">

    <div class="journey-left">

        <div class="status-pill">
            OUR JOURNEY
        </div>

        <h1 class="journey-title">
            Moments That <br>
            <span class="gradient-text">Define Us.</span>
        </h1>

        <p class="journey-description">
            A journey of collaboration, learning, leadership and innovation.<br>
            Explore the events, workshops, interactions and memories that have<br>
            shaped SAI Cell into a thriving student community.
        </p>

        <div class="action-cluster">
            <a href="https://www.alumninitdgp.in/event" target="_blank" class="nav-btn-wrapper">
                <button class="btn-primary-glow">
                    EXPLORE EVENTS
                </button>
            </a>
        </div>

    </div>

    <div class="journey-right">

        <div class="journey-image-frame">

            <img
                src="group-photo.jpg"
                alt="SAI Cell Team"
                class="journey-image"
            >

        </div>

    </div>
    </main> 
<main>
    <section class="captured-moments">

    <div class="section-header">

        <span class="section-tag">
            PHOTO GALLERY
        </span>

        <h2>
            Captured <span>Moments</span>
        </h2>

    </div>

    <div class="slider-wrapper">

        <button class="slide-btn prev">
            &#10094;
        </button>

        <div class="slider">

            <img src="pic1.jpg" alt="Sai Cell Team">
            <img src="pic3.jpg" alt="Sai Cell Team">
            <img src="pic6.jpg" alt="Sai Cell Event">
            <img src="pic4.jpg" alt="Sai Cell Event">
            <img src="pic5.jpg" alt="Sai Cell with Alumni">
            <img src="pic2.jpg" alt="Sai Cell First Year">

        </div>

        <button class="slide-btn next">
            &#10095;
        </button>

    </div>
    </main>

</section>
<script src="journey.js"></script>

  </body>
</html>
